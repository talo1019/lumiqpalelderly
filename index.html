<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f7f2" />
    <meta name="description" content="LumiqPal — a calmer family companion for every generation." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LumiqPal" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/app-icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <title>LumiqPal</title>
  </head>
  <body>
    <main class="showcase">
      <section class="demo-stage" aria-label="Interactive app preview">
        <div class="device-frame" aria-label="iPhone 17 Pro Max">
          <span class="side-control action-control" aria-hidden="true"></span>
          <span class="side-control volume-up" aria-hidden="true"></span>
          <span class="side-control volume-down" aria-hidden="true"></span>
          <span class="side-control camera-control" aria-hidden="true"></span>
          <div class="phone" id="app" data-role="elder">
            <div class="status-bar" aria-hidden="true">
              <span id="status-time">9:41</span>
              <span class="dynamic-island"></span>
              <span class="status-icons">
                <svg viewBox="0 0 24 24"><path d="M3 18h2v3H3zm4-4h2v7H7zm4-4h2v11h-2zm4-4h2v15h-2z"/></svg>
                <svg viewBox="0 0 24 24"><path d="M12 18.5 15 15.6a4.2 4.2 0 0 0-6 0l3 2.9Zm-6-5.8 1.5 1.5a6.4 6.4 0 0 1 9 0l1.5-1.5a8.5 8.5 0 0 0-12 0Zm-3-3 1.5 1.5a10.6 10.6 0 0 1 15 0L21 9.7a12.7 12.7 0 0 0-18 0Z"/></svg>
                <span class="battery"><i></i></span>
              </span>
            </div>
            <div id="screen" class="screen" aria-live="polite"></div>
            <div class="home-indicator" aria-hidden="true"></div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <section class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title" hidden></section>

    <script src="/app.js" defer></script>
  </body>
</html>
